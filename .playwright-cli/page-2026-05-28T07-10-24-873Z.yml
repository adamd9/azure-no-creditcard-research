            - heading "Registering your organization" [level=3] [ref=e181]
            - generic [ref=e182]: The person completing the nonprofit registration must be an employee or strategic volunteer of the nonprofit. If you are a third-party IT provider or other entity working for a nonprofit, you may not complete registration on its behalf.
        - generic [ref=e187]:
          - heading "3. Who can use the license?" [level=2] [ref=e189]
          - generic [ref=e191]: Nonprofit discounts and grants are permitted for specific employees and volunteers. Nonprofit beneficiaries, donors, and members (such as members of a church, club, or sports team) are not eligible for nonprofit offers.
        - heading "Grants vs. discounted licenses" [level=3] [ref=e196]:
          - paragraph [ref=e197]: Grants vs. discounted licenses
        - generic [ref=e200]:
          - paragraph [ref=e201]: "Depending on the employee status and role in the nonprofit there is a difference between available offers:"
          - list [ref=e202]:
            - listitem [ref=e203]: Grants – Granted licenses are only permitted for paid employees and unpaid executive staff if all organization eligibility is met. User amount limits do apply and vary by availability of country of usage. Additionally, organizations are expected to regularly remove unused granted licenses from their subscription. Adherence to policy guidance is encouraged and tenant may be subject to audit by Microsoft.
            - listitem [ref=e204]: Discounts – Discounted licenses are permitted for all staff, including volunteers and temporary staff of the organization. Eligible nonprofits may access discounted pricing on commercial cloud offers, and some on-premise offers. Discounts vary by product, and/or quantity
        - generic [ref=e207]:
