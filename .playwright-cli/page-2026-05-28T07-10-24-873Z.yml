              - generic [ref=e213]: Paid staff includes employees on mandatory unpaid time off but who remain employees of the nonprofit, often referred to as furloughed staff. It does not include staff whose employment has been terminated or is subject to layoff. Paid staff are permitted to use granted and discounted licenses.
