    - main [ref=e44]:
      - generic [ref=e47]:
        - heading "Enterprise Dev/Test" [level=1] [ref=e56]
        - generic [ref=e62]:
          - heading "Overview" [level=2] [ref=e63]:
            - generic [ref=e64]: Overview
          - paragraph [ref=e65]: "Enterprise Agreement customers now have a great way to run their development and testing workloads on Azure, with numerous advantages:"
          - list [ref=e66]:
            - listitem [ref=e67]: Ideal for teams, multiple subscriptions allowed
            - listitem [ref=e68]: Access to Dev/Test images in the Gallery, including Windows 8.1 and Windows 10
            - listitem [ref=e69]: Special lower Dev/Test rates on Windows Virtual Machines, Cloud Services, SQL Database, SQL Managed Instance, HDInsight, App Service (Basic, Standard, Premium v2, Premium v3) and Logic Apps
            - listitem [ref=e70]:
              - text: Additional savings with
              - link "Reservations" [ref=e71] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2240558
              - text: for one-year or three-year commitment on VMs, Azure SQL Database and Azure SQL Managed Instance
            - listitem [ref=e72]: Same great EA rates on other Azure services
            - listitem [ref=e73]: Centralized management via the Azure Enterprise Portal
            - listitem [ref=e74]: No separate payment—just use the funds already on your Enterprise Agreement
          - paragraph [ref=e75]: Only active Visual Studio subscribers with standard subscriptions can use the Azure resources running within an Enterprise Dev/Test subscription, though end users can also access the application to provide feedback or perform acceptance tests. You need a Visual Studio subscription for each member who needs to access an Enterprise Dev/Test subscription. Use of resources within this subscription is restricted to developing and testing applications, and no uptime guarantee is offered.
          - paragraph [ref=e76]:
            - text: Separately, most active Visual Studio subscribers (standard subscriptions only; monthly cloud subscriptions excluded) also can set up one separate individual Azure subscription with a monthly credit, which is ideal for light development and testing workloads, experimentation with Azure services, learning, prototyping, and proofs of concept. These
            - link "monthly Azure credits for Visual Studio subscribers" [ref=e77] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/member-offers/credit-for-visual-studio-subscribers/
            - text: are unrelated to Enterprise Dev/Test subscriptions.
          - paragraph [ref=e78]:
            - text: Not an Enterprise Agreement customer but need an Azure subscription for your development team? Try
            - link "Pay-As-You-Go Dev/Test" [ref=e79] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0023p/
        - generic [ref=e85]:
          - heading "Details" [level=2] [ref=e86]:
            - generic [ref=e87]: Details
          - heading "Low Dev/Test Rates" [level=3] [ref=e88]:
            - strong [ref=e89]:
              - generic [ref=e90]: Low Dev/Test Rates
          - paragraph [ref=e91]: "All Windows and Windows Server Virtual Machines, Cloud Services, App Service (basic, standard, Pv2, Pv3), Logic Apps and HDInsight are discounted off your normal Enterprise Agreement rates. The Dev/Test rate on these services is equal to the rate for a Linux virtual machine of the same size and type. For example:"
          - list [ref=e92]:
            - listitem [ref=e93]: A Windows Server/Medium (A2)/Basic Instance virtual machine is billed at the Linux/Medium (A2)/Basic Instance virtual machine rate
            - listitem [ref=e94]: A Websites/Large (L)/Standard is billed at the Linux/Large (A3)/Standard Instance virtual machine rate
            - listitem [ref=e95]: A HDInsight Head Node (on an Extra Large A4 instance) is billed at the Linux/Extra Large (A4)/Standard Instance virtual machine rate
            - listitem [ref=e96]:
              - text: Logic Apps Enterprise Connection is billed at 50% of
              - link "published Logic Apps pricing" [ref=e97] [cursor=pointer]:
                - /url: https://azure.microsoft.com/en-us/pricing/details/logic-apps/
                - text: published
              - text: pricing
          - heading "Access to Windows 10 and Windows Virtual Desktop service" [level=3] [ref=e98]:
            - strong [ref=e99]:
              - generic [ref=e100]: Access to Windows 10 and Windows Virtual Desktop service
          - paragraph [ref=e101]:
            - text: You can run Windows 10 images on Azure for dev/test using this offer. You can also access the
            - link "Windows Virtual Desktop" [ref=e102] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/products/virtual-desktop/
            - text: service within your DevTest subscription to simplify the management experience of your Windows VMs and easily deploy and scale your development and test environments all while enjoying special discounts.
          - heading "No additional charge for using Visual Studio software" [level=3] [ref=e103]:
            - strong [ref=e104]:
              - generic [ref=e105]: No additional charge for using Visual Studio software
          - paragraph [ref=e106]: There is no additional charge for the software included with your Visual Studio subscription that you run for development and testing on Azure Windows Server virtual machines, such as SQL Server. You can also use preconfigured virtual machine images, such as SQL Server and BizTalk Server, without incurring software charges. Alternatively, upload your own virtual machine with software from your Visual Studio subscription. You will only be charged at the discounted VM rate.
          - paragraph [ref=e107]:
            - text: On this Enterprise Dev/Test subscription, you can use the software covered by your
            - link "Visual Studio subscription" [ref=e108] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2244143
            - text: for development and testing. Microsoft server software products that are supported on Azure
            - link "Virtual Machines are listed here" [ref=e109] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2215635
            - text: .
          - paragraph [ref=e110]: Any taxes which may result from receiving services at no charge are the sole responsibility of the recipient.
          - heading "How to Set Up an Azure Subscription Based on This Offer:" [level=3] [ref=e111]:
            - strong [ref=e112]:
              - generic [ref=e113]: "How to Set Up an Azure Subscription Based on This Offer:"
          - paragraph [ref=e114]: Enterprise Agreement (EA) customers designate an Enterprise Administrator with access to the Azure Enterprise Portal. This administrator assigns users as Account Owners via the portal. These Account Owners can then create Azure subscriptions under the EA. To enable creation of subscriptions based on the Enterprise Dev/Test offer, the Enterprise Administrator must select the “Dev/Test” option for the Account Owner. After creating the subscription via the Azure Account Portal, the Account Owner should assign appropriate roles to active Visual Studio subscribers, allowing them to manage and utilize the development and testing resources effectively.
          - heading "Service-level agreements" [level=2] [ref=e115]:
            - generic [ref=e116]: Service-level agreements
          - paragraph [ref=e117]:
            - text: Enterprise Dev/Test is exclusively for development and testing your applications. Usage within the subscription does not carry a financially-backed
            - link "SLA" [ref=e118] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2241222
            - text: ", except for use of Azure DevOps and Visual Studio App Center."
