        - heading "Microsoft Azure Sponsorship Offer" [level=1] [ref=e56]
        - generic [ref=e62]:
          - heading "Microsoft Azure Sponsorship Offer Details" [level=2] [ref=e63]:
            - generic [ref=e64]: Microsoft Azure Sponsorship Offer Details
          - paragraph [ref=e65]:
            - strong [ref=e66]: This offer for a limited sponsored Microsoft Azure account is available by e-mail invitation only for limited customers selected by Microsoft
            - text: . If you are entitled to the Microsoft Azure Sponsorship offer, you would have received an e-mail invitation to accept this offer for your Account ID.
          - heading "Special Pricing" [level=2] [ref=e67]:
            - generic [ref=e68]: Special Pricing
          - paragraph [ref=e69]:
            - text: The pricing for your Microsoft Azure usage under this offer will be 100% off standard published
            - link "Pay-As-You-Go" [ref=e70] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/offers/ms-azr-0003p/
            - text: rates for the term specified below.
          - heading "Term & Conversion to Paid Account" [level=2] [ref=e71]:
            - generic [ref=e72]: Term & Conversion to Paid Account
          - paragraph [ref=e73]:
            - text: Unless prohibited by applicable law or otherwise specified in writing, the special pricing will terminate and your subscription(s) under the Microsoft Azure Sponsorship offer will be converted automatically to the
            - link "Pay-As-You-Go" [ref=e74] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/offers/ms-azr-0003p/
            - text: offer upon the earlier occurrence of (1) when your total cumulative usage reaches your Usage Cap (as specified in your invitation e-mail) at standard
            - link "Pay-As-You-Go" [ref=e75] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/offers/ms-azr-0003p/
            - text: rates prior to application of any discount or (2) when you reach your End Date (as specified in your invitation e-mail). Your special pricing will also terminate if your Account ID (as specified in your invitation e-mail) is associated with an applicable Enterprise Agreement enrollment, in which case you will be subject to the pricing and terms of your Enterprise Agreement. You will be responsible for all usage charges after the special pricing expires.
          - heading "Exclusions" [level=2] [ref=e76]:
            - generic [ref=e77]: Exclusions
          - paragraph [ref=e78]: Special pricing does not apply to Microsoft Azure support plans, third-party branded products, products sold through Microsoft Azure Marketplace, or products otherwise sold separately from Microsoft Azure (for example, Active Directory Premium). Tiered pricing does not apply to sponsorship; all services are billed at flat PAYG rates which are utilized through sponsorship credits. You will be responsible for all charges incurred for these services and products.
          - paragraph [ref=e79]: The Sponsorship offer can’t be combined with other licensing, prepaid, or credit offers (i.e Microsoft Enterprise Agreement, Cloud Solution Partner, Azure in Open, Azure Pass, Action Pack, etc.).
          - paragraph [ref=e80]: You will not facilitate, engage in, or participate in any use of Azure services, for crypto currency mining, denial of service attacks, spamming, or illegal activity, and/or any use that could cause harm to Microsoft or others, and will enforce strong internal controls to prevent the same. Microsoft may from time to time contact you regarding your use of your Azure services and you will upon such request provide reasonable documentation regarding your use. If Microsoft believes for any reason that such Azure services are being used for any prohibited purpose, Microsoft may, in its sole discretion, suspend or terminate your access to the Azure services.
          - heading "Payment Options" [level=2] [ref=e81]:
            - generic [ref=e82]: Payment Options
          - paragraph [ref=e84]: Credit or debit cards only, unless previously approved for invoice. Please note that we do not accept prepaid and virtual credit cards. There may be a delay before discounts are reflected on your bill. You are solely responsible for any credit card interest or other credit card charges that may result.
          - paragraph [ref=e85]:
            - text: More details on pricing and billing can be found on our
            - link "Pricing page" [ref=e86] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/
            - text: .
          - heading "Cancellation policy" [level=2] [ref=e87]:
            - generic [ref=e88]: Cancellation policy
          - paragraph [ref=e89]: You may cancel at any time. Payment is required for any outstanding fees incurred.
          - heading "Microsoft Customer Agreement" [level=2] [ref=e90]:
            - generic [ref=e91]: Microsoft Customer Agreement
          - paragraph [ref=e93]:
            - text: Your subscription is subject to the Microsoft Customer Agreement (MCA) to which you agreed (current version available
            - link "Microsoft Azure Legal Information" [ref=e94] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/support/legal/
              - text: here
            - text: ).
          - heading "Offer Availability" [level=2] [ref=e95]:
