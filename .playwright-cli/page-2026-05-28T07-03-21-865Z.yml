        - generic [ref=e1666]:
          - heading "Limits, Quotas and Constraints" [level=2] [ref=e1667]:
            - generic [ref=e1668]: Limits, Quotas and Constraints
          - paragraph [ref=e1669]:
            - text: Please refer to this
            - link "document for Azure subscription and service limits, quotas, and constraints" [ref=e1670] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2243832
              - text: document
            - text: for a list of common Microsoft Azure limits, quotas and constraints.
          - paragraph [ref=e1671]:
            - text: The following monthly usage quotas are applied. If you need more than these limits, please contact
            - link "customer service support" [ref=e1672] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/support/
              - text: customer service
            - text: at any time so that we can understand your needs and adjust these limits appropriately.
          - heading "Service-level agreements" [level=2] [ref=e1673]:
            - generic [ref=e1674]: Service-level agreements
          - paragraph [ref=e1675]:
            - text: We offer a set of robust service level agreements for each of the Azure platform services. More details on each of our SLAs can be found on our
            - link "SLA page." [ref=e1676] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2252476
            - text: Service level agreements are not provided for services during preview.
            - link:
              - /url: https://go.microsoft.com/fwlink/?linkid=2252476
          - heading "Resource Commitment" [level=2] [ref=e1677]:
            - generic [ref=e1678]: Resource Commitment
          - paragraph [ref=e1679]: All increases in usage levels of service resources (e.g. adding to the number of compute instances running, or increasing the amount of storage in use) are subject to the availability of these service resources. Any quota described in the Limits, Quotas and Constraints section is not a commitment that there will be sufficient resources available for you to reach the quota.
          - paragraph [ref=e1680]: For any subscriptions of this offer that are not incurring charges and are inactive for more than 90 days, we reserve the right to remove any compute resources including hosted service(s), virtual machines and websites. Please note that no data would be deleted and customers can redeploy at any time. We will also provide advance notice prior to removing any compute resources.
          - paragraph [ref=e1681]: "You can also avoid having your compute resources removed by doing either of the following every 90 days:"
          - list [ref=e1682]:
            - listitem [ref=e1683]:
              - text: Log into either the
              - link "Azure portal" [ref=e1684] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2243551
              - text: or the new
              - link "Microsoft Azure portal" [ref=e1685] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2243551
            - listitem [ref=e1686]: Access your resources via our Azure APIs
