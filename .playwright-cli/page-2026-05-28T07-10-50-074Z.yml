        - generic [ref=e54]:
          - heading "Azure Government Free Trial" [level=1] [ref=e56]
          - link "Request an Azure Government trial" [ref=e59] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/p/?linkid=2240371&clcid=0x409
        - generic [ref=e65]:
          - paragraph [ref=e66]: We offer a 90 day free trial for valid government community customers and provide credits of $500 of Azure Government at no charge per 30 day period.
          - heading "Flexibility with Azure Credits" [level=2] [ref=e67]:
            - generic [ref=e68]: Flexibility with Azure Credits
          - paragraph [ref=e69]: You receive $500 of Azure credits with the Azure Government Free Trial for each 30 day period. The choice is yours on how you use your Azure Government credits. Use them on any Azure Government consumption services based on your needs including, Virtual Machines, Cloud Services, Storage, SQL Database, Media Services, and many more.
          - paragraph [ref=e70]: "Here are a few usage scenarios that consume no more than $500 in a month:"
          - list [ref=e71]:
            - listitem [ref=e72]: Run 9 small Virtual Machine instances for the entire month, or
            - listitem [ref=e73]: Store 5 TB of data in Geographically Redundant Storage, or
            - listitem [ref=e74]: Develop and test a web application using Cloud Services, with 5 web roles and 5 worker roles on medium instances, for 10 hours a day, 5 days a week, and 1 S2 Azure SQL DB or
            - listitem [ref=e75]: Run two S2 SQL databases for the entire month
          - paragraph [ref=e76]: Any unused monthly credits cannot be carried over to subsequent 30 day period and cannot be transferred to other Azure subscriptions. Monthly usage in excess of the monthly credit amount included with your offer will mean that your account will be disabled for the remainder of the 30 day period. This offer is limited to one offer per new customer.
          - paragraph [ref=e77]: Use up to your Azure credits at no charge. If you exceed your credits, your service will be disabled. When in a disabled state, all resources continue to operate in the manner they were operating when the limit was hit, but you will be unable to turn on or provision new resources. When the next 30 day period begins, the account will return to normal operations. You can choose to turn off these limits by converting to an Enterprise Agreement.
          - paragraph [ref=e78]: Any taxes which may result from receiving services at no charge are the sole responsibility of the recipient.
          - heading "Exclusions" [level=2] [ref=e79]:
            - generic [ref=e80]: Exclusions
          - paragraph [ref=e81]: Azure Credits may not be used to purchase Azure support plans, third-party branded products, or products otherwise sold separately from Azure (for example, Microsoft Microsoft Entra ID Premium).
          - heading "Payment Options" [level=2] [ref=e82]:
            - generic [ref=e83]: Payment Options
          - paragraph [ref=e84]: Azure Government is only available for purchase through approved Volume License programs like Enterprise Agreements.
          - heading "Cancelation Policy" [level=2] [ref=e85]:
            - generic [ref=e86]: Cancelation Policy
          - paragraph [ref=e87]: You may cancel this subscription at any time.
          - heading "Offer availability" [level=2] [ref=e88]:
            - generic [ref=e89]: Offer availability
          - paragraph [ref=e90]: This offer is available to customers located in the United States and we require a proper validation of all customers within Azure Government. Before being eligible for this offer you validated get validated as a Government community member by the Microsoft Government Cloud validation team.
          - heading "Limits, Quotas and Constraints" [level=2] [ref=e91]:
            - generic [ref=e92]: Limits, Quotas and Constraints
          - paragraph [ref=e93]:
            - text: Please refer to this
            - link "document of Limits, Quotas and Constraints" [ref=e94] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2240193
              - text: document
            - text: for a list of common Microsoft Azure limits, quotas and constraints.
          - paragraph [ref=e95]:
            - text: The following monthly usage quotas are applied. If you need more than these limits, please contact
            - link "customer service for Azure support" [ref=e96] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/support/
              - text: customer service
            - text: at any time so that we can understand your needs and adjust these limits appropriately.
          - heading "Service-level agreements" [level=2] [ref=e97]:
            - generic [ref=e98]: Service-level agreements
          - paragraph [ref=e99]:
            - text: We offer a set of robust service level agreements for each of the Azure platform services. More details on each of our SLAs can be found on our
            - link "SLA page for Online Services" [ref=e100] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2239988
              - text: SLA page
            - text: . Service level agreements are not provided for services during preview.
          - heading "Resource Commitment" [level=2] [ref=e101]:
            - generic [ref=e102]: Resource Commitment
          - paragraph [ref=e103]: All increases in usage levels of service resources (e.g. adding to the number of compute instances running, or increasing the amount of storage in use) are subject to the availability of these service resources. Any quota described in the Limits, Quotas and Constraints section is not a commitment that there will be sufficient resources available for you to reach the quota.
          - paragraph [ref=e104]: For any subscriptions of this offer that are not incurring charges and are inactive for more than 90 days, we reserve the right to remove any compute resources including hosted service(s), virtual machines and websites. Please note that no data would be deleted and customers can redeploy at any time. We will also provide advance notice prior to removing any compute resources.
          - paragraph [ref=e105]: "You can also avoid having your compute resources removed by doing either of the following every 90 days:"
          - list [ref=e106]:
            - listitem [ref=e107]:
              - text: Log into the
              - link "Microsoft Azure portal" [ref=e108] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2239781
            - listitem [ref=e109]: Access your resources via our Azure APIs
