        - generic [ref=e220]:
          - paragraph [ref=e221]: Your Azure for Students subscription might get disabled because you used all of your credit. It might also get disabled if your credit is expired or you accidentally canceled your subscription. See what issue applies to you and learn how you can get your subscription reactivated.
          - generic [ref=e222]:
            - 'link "Section titled: You used all of your credit" [ref=e223] [cursor=pointer]':
              - /url: "#you-used-all-of-your-credit"
              - text: 
            - heading "You used all of your credit" [level=2] [ref=e224]
          - paragraph [ref=e225]:
            - text: Azure for Students account gives you $100 in credit and a limited quantity of free services for 12 months. Any usage beyond the free services and quantities is deducted from your credit. Once your credit runs out, Azure disables your services and subscription. To continue using Azure services, you must upgrade your subscription to a pay-as-you-go subscription by contacting
            - link "Azure support" [ref=e226] [cursor=pointer]:
              - /url: https://portal.azure.com/?#blade/Microsoft_Azure_Support/HelpAndSupportBlade
            - text: . After upgrade, your subscription still has access to free services for 12 months from your sign-up date. You only get charged for usage beyond the free services and quantities.
          - paragraph [ref=e227]:
            - text: You can check your remaining credit on the
            - link "Microsoft Azure Sponsorships portal" [ref=e228] [cursor=pointer]:
              - /url: https://www.microsoftazuresponsorships.com/balance
            - text: .
          - list [ref=e229]:
            - listitem [ref=e230]:
              - paragraph [ref=e231]: Sign in using your Azure for Students account credentials.
            - listitem [ref=e232]:
              - paragraph [ref=e233]: The balance page gives information about used and remaining credit. You can find your credit expiration date below the credit chart.
              - paragraph [ref=e234]:
                - img "Screenshot that shows credit information for Azure for Students subscription." [ref=e236]
            - listitem [ref=e237]:
              - paragraph [ref=e238]:
                - text: To check usage of services that are consuming your Azure credit, select
                - strong [ref=e239]: Usage
                - text: from the left navigation then select your Azure for Students subscription.
              - paragraph [ref=e240]:
                - img "Screenshot that shows usage information for Azure for Students credit." [ref=e242]
          - paragraph [ref=e243]: "The table contains the following columns:"
          - list [ref=e244]:
            - listitem [ref=e245]:
              - strong [ref=e246]: "Service Name:"
              - text: Service that is consuming your Azure credit.
            - listitem [ref=e247]:
              - strong [ref=e248]: "Service Resource:"
              - text: Unit of measurement for the service being consumed.
            - listitem [ref=e249]:
              - strong [ref=e250]: "Spend:"
              - text: Amount of credit in USD($) spent on the service.
          - generic [ref=e251]:
            - 'link "Section titled: Your credit expired" [ref=e252] [cursor=pointer]':
              - /url: "#your-credit-expired"
              - text: 
            - heading "Your credit expired" [level=2] [ref=e253]
          - paragraph [ref=e254]:
            - text: Your Azure for Students credit expires at the end of 12 months. Once your credit expires, Azure disables your subscription. To continue using Azure services, you must upgrade your subscription to a pay-as-you-go subscription by contacting
            - link "Azure support" [ref=e255] [cursor=pointer]:
              - /url: https://portal.azure.com/?#blade/Microsoft_Azure_Support/HelpAndSupportBlade
            - text: . After upgrade, Azure charges you pay-as-you-go rates for any services you're using.
          - generic [ref=e256]:
            - 'link "Section titled: You accidentally canceled your subscription" [ref=e257] [cursor=pointer]':
              - /url: "#you-accidentally-canceled-your-subscription"
              - text: 
            - heading "You accidentally canceled your subscription" [level=2] [ref=e258]
          - paragraph [ref=e259]:
            - text: If you accidentally canceled your Azure for Students subscription, you can reactivate it by contacting
            - link "Azure support" [ref=e260] [cursor=pointer]:
              - /url: https://portal.azure.com/?#blade/Microsoft_Azure_Support/HelpAndSupportBlade
            - text: . Once you reactivate, you still have access to the remaining credit and free services for 12 months from your sign-up date.
