          - heading "Microsoft Azure for Students Starter Offer" [level=1] [ref=e56]
          - link "Activate Microsoft Azure for Students Starter Offer" [ref=e59] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/p/?linkid=2244151&clcid=0x409
            - text: Activate
        - generic [ref=e65]:
          - paragraph [ref=e66]:
            - text: Microsoft Azure for Students Starter gets you started with the Azure products you need to develop in the cloud at no cost to you.*. Enroll
            - link "here for student verification" [ref=e67] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2244151
              - text: here
            - text: ". This benefit provides you access to a free tier including that includes the following Azure services:"
          - list [ref=e68]:
            - listitem [ref=e69]:
              - strong [ref=e70]: Azure App Services.
              - text: "This fully managed cloud offering enables you to build and deploy native and web apps in minutes. Use the technology you love:"
              - link "ASP.NET" [ref=e71] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2244043
              - text: ", Java, PHP, Node.js, or Python. Add a variety of essential app services, including authentication, social integration, and offline data sync, regardless of whether your app runs on Windows 10, iOS, or Android. Set up continuous integration and deployment workflows with VSO, GitHub, TeamCity, Hudson, or Bitbucket, enabling you to automatically build, test, and deploy your web app on each successful code check-in or integration tests."
            - listitem [ref=e72]:
              - strong [ref=e73]: Azure Functions.
              - text: Write simple, serverless functions in the programming language of your choice to run code on-demand without worrying about infrastructure.
            - listitem [ref=e74]:
              - strong [ref=e75]: Notification Hubs.
              - text: Keep your app in touch with users by sending mobile push notifications tailored by audience, language, and location using any back end and major mobile platform.
            - listitem [ref=e76]:
              - strong [ref=e77]: MySQL database from MySQL in-app.
              - text: This gives you the experience of native MySQL support for your Web Apps. Deploy CMS solutions such as WordPress, Joomla, and more, or custom applications driven by MySQL database.
            - listitem [ref=e78]:
              - strong [ref=e79]: Application Insights.
              - text: Get deep diagnostics and performance telemetry to ensure your web apps and services are running at their maximum potential. Search and analyze your data to continuously improve your application, prioritize future investments, and improve the overall customer experience.
            - listitem [ref=e80]:
              - strong [ref=e81]: Azure DevOps.
              - text: This set of cloud-powered collaboration tools works with your existing IDE or editor so your team can work effectively on software projects of all sizes.
          - paragraph [ref=e82]: Microsoft Azure for Students Starter is available to verified students at no cost, commitment, or time limit. You can access more services later if you want, but you can host your web apps and websites today with the power of the Microsoft cloud behind you and it won’t cost you anything.
          - paragraph [ref=e83]:
            - text: "*Costs are limited by providing access to Azure services that include a free tier of service use. For more details on Azure pricing, please visit our"
            - link "Pricing page" [ref=e84] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/
            - text: .
          - paragraph [ref=e85]: Microsoft Azure for Students Starter is available only to students. You must affirm that you are age 13 or older if you reside in the United States and age 16 or older if you reside in a country other than the United States and verify your academic status through your organization’s email address (or Shibboleth, if supported by your organization). This offer is not available for use in a massive open online course (MOOC) or in other professional trainings from for-profit organizations.
          - paragraph [ref=e86]: This offer is limited to one Microsoft Azure for Students Starter subscription per eligible customer, is non-transferable, and cannot be combined with any other offer unless otherwise permitted by Microsoft. Microsoft may terminate this offer at our sole discretion. Other restrictions may apply.
          - heading "Upgrades and spending limits" [level=2] [ref=e87]:
            - generic [ref=e88]: Upgrades and spending limits
          - paragraph [ref=e89]:
            - text: You may upgrade to a
            - link "Pay-As-You-Go subscription" [ref=e90] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0003p/
            - text: online at any time. This allows continued use of Azure.
          - heading "Exclusions" [level=2] [ref=e91]:
            - generic [ref=e92]: Exclusions
          - paragraph [ref=e93]: You will initially be able to access only Azure services that are available with a free tier of service use. Your account will start with a 0 dollar spending limit, which means you’ll be able to consume only the Azure services that are within the free tier of the service offer.
          - paragraph [ref=e94]: You will not facilitate, engage in, or participate in any use of Azure services, for crypto currency mining, denial of service attacks, spamming, or illegal activity, and/or any use that could cause harm to Microsoft or others, and will enforce strong internal controls to prevent the same. Microsoft may from time to time contact you regarding your use of your Azure services and you will upon such request provide reasonable documentation regarding your use. If Microsoft believes for any reason that such Azure services are being used for any prohibited purpose, Microsoft may, in its sole discretion, suspend or terminate your access to the Azure services.
          - heading "Software Download Benefits" [level=2] [ref=e95]:
            - generic [ref=e96]: Software Download Benefits
          - paragraph [ref=e97]: Your Subscription will provide you with access to certain Software Download Benefits expressly intended to support your education, non-commercial research, or efforts to design, develop, test, and demonstrate software applications for the above purposes. Software Download Benefits are personal to you and you may not transfer, sell, share, sublicense, assign, or lend them. Your access to and use of the Software Download Benefits are subject to the terms of this Agreement and any separate terms that are specific to the particular benefit. You must have a current, active Azure for Students subscription in order to access most of the Software Download Benefits.
          - heading "Software" [level=2] [ref=e98]:
            - generic [ref=e99]: Software
          - paragraph [ref=e100]: Your installation and use of any software; cloud services or developer tools provided as Software Download Benefits is subject to separate license terms provided with the software, services or tools, such as click-through license terms, except for any changes to those terms that are provided in this Agreement. You may only use these Software Download Benefits in a virtual environment if allowed by the specific product end user license. Of course, you may not use the software, cloud services of developer tools to develop any form of malicious software or spamware.
          - paragraph [ref=e101]: Certain software may require activation. If so, you must activate the software within the geographic region associated with your Azure for Students subscription.
          - paragraph [ref=e102]: Certain software may require a key to install or access it. Not all software is provided with the same number of keys. You are responsible for the use of any keys assigned to you. You may not transfer, sell, share, sublicense, assign, or lend keys. Key activity is monitored. Microsoft reserves the right to suspend or terminate your Azure for Students subscription or access to the software, without any notice or obligation to you, if we detect suspicious activity related to keys or activations. Microsoft reserves the right to determine in its sole discretion whether an activity constitutes suspicious activity. Microsoft may deactivate or otherwise limit your keys when your Azure for Students subscription ends. Deactivated keys will not be able to activate software. You will not engage in or facilitate the unauthorized manufacture, duplication, delivery, sale, transfer or use of counterfeit, pirated, unlicensed or illegal Microsoft products or services, or otherwise infringe any of Microsoft’s intellectual property rights. You will timely report to Microsoft any suspected counterfeiting, piracy or other intellectual property infringement, and will reasonably cooperate with Microsoft and its affiliates in the investigation of any such activities. You may not use Software Download Benefits to provide any services to others (such as hosting, web agency, integration or outsourced development, etc.).
          - paragraph [ref=e103]: The software may include third party code. Any third party scripts or code, linked to or referenced from the software, are licensed to you by the third parties that own such code, not by Microsoft. Notices, if any, for the third party code are included for your information only. The software made available to you in the Microsoft Azure for Students Starter subscription is licensed, not sold, and Microsoft reserves all rights to the software not expressly granted by Microsoft, whether by implication, estoppel, or otherwise.
          - heading "Exclusions" [level=2] [ref=e104]:
            - generic [ref=e105]: Exclusions
          - paragraph [ref=e106]: Azure credits may not be used to purchase Azure support plans, Azure DevOps, Visual Studio subscriptions, Visual Studio Mobile Center services, third-party branded products, products sold through the Azure Marketplace, or products otherwise licensed separately from Azure (for example, Microsoft Azure Active Directory Premium).
          - heading "Prohibited Use of Microsoft Azure for Students Starter" [level=2] [ref=e107]:
            - generic [ref=e108]: Prohibited Use of Microsoft Azure for Students Starter
          - paragraph [ref=e109]: As a condition of your use of Microsoft Azure for Students Starter, you will not use them for any purpose that is unlawful or prohibited by these terms, conditions, and notices. You may not use Azure for Students Starter in any manner that could damage, disable, overburden, or impair any Microsoft server, or the network(s) connected to any Microsoft server, or interfere with any other party's use and enjoyment of Microsoft Azure for Students Starter. You may not attempt to gain unauthorized access to any Microsoft Azure for Students Starter, other accounts, computer systems, or networks connected to any Microsoft server through hacking, password mining, or any other means. You may not obtain or attempt to obtain any materials or information through any means not intentionally made available through the Azure for Students Starter.
          - paragraph [ref=e110]: "Microsoft Azure for Students Starter and associated website(s) may contain e-mail services, bulletin board services, chat areas, forums, communities, personal web pages, calendars, photo albums, file cabinets, and/or other message or communication facilities designed to enable you to communicate with others (\"Communication Services\"). You agree to use the Communication Services only to post, send, and receive messages and material that are proper and, when applicable, related to the particular Communication Service. By way of example, and not as a limitation, you agree that when using the Communication Services, you will not:"
          - paragraph [ref=e111]: Use the Communication Services in connection with surveys, contests, pyramid schemes, chain letters, junk email, spamming, or any duplicative or unsolicited messages (commercial or otherwise).
          - paragraph [ref=e112]: Defame, abuse, harass, stalk, threaten, or otherwise violate the legal rights (such as rights of privacy and publicity) of others.
          - paragraph [ref=e113]: Publish, post, upload, distribute, or disseminate any inappropriate, profane, defamatory, obscene, indecent, or unlawful topic, name, material, or information.
          - paragraph [ref=e114]: Upload, or otherwise make available, files that contain images, photographs, software, or other material protected by intellectual property laws, including, by way of example, and not as limitation, copyright or trademark laws (or by rights of privacy or publicity) unless you own or control the rights thereto or have received all necessary consent to do the same.
          - paragraph [ref=e115]: Use any material or information, including images or photographs, which are made available through the Communication Services in any manner that infringes any copyright, trademark, patent, trade secret, or other proprietary right of any party.
          - paragraph [ref=e116]: Upload files that contain viruses, Trojan horses, worms, time bombs, ransomware, cancelbots, corrupted files, malware in general, or any other similar software or programs that may damage the operation of another's computer or property of another.
          - paragraph [ref=e117]: Advertise or offer to sell or buy any goods or services for any business purpose, unless such Communication Services specifically allows such messages.
          - paragraph [ref=e118]: Download any file posted by another user of a Communication Service that you know, or reasonably should know, cannot be legally reproduced, displayed, performed, and/or distributed in such manner.
          - paragraph [ref=e119]: Falsify or delete any copyright management information, such as author attributions, legal or other proper notices, or proprietary designations or labels of the origin or source of software or other material contained in a file that is uploaded.
          - paragraph [ref=e120]: Restrict or inhibit any other user from using and enjoying the Communication Services.
          - paragraph [ref=e121]: Violate any code of conduct or other guidelines which may be applicable for any particular Communication Service.
          - paragraph [ref=e122]: Harvest or otherwise collect information about others, including e-mail addresses.
          - paragraph [ref=e123]: Violate any applicable laws or regulations.
          - paragraph [ref=e124]: Create a false identity for the purpose of misleading others.
          - paragraph [ref=e125]: Use, download, or otherwise copy, or provide (whether or not for a fee) to a person or entity any directory of users of Azure for Students or other user or usage information or any portion thereof.
          - paragraph [ref=e126]: Microsoft has no obligation to monitor the Communication Services. However, Microsoft reserves the right to review materials posted to the Communication Services and to remove any materials in its sole discretion.
          - paragraph [ref=e127]: Microsoft reserves the right at all times to disclose any information as Microsoft deems necessary to satisfy any applicable law, regulation, legal process, or governmental request, or to edit, refuse to post, or to remove any information or materials, in whole or in part, in Microsoft's sole discretion.
          - paragraph [ref=e128]: Always use caution when giving out any personally identifiable information about yourself and sensitive information in any Communication Services.
          - paragraph [ref=e129]: Microsoft does not control or endorse the content, messages or information found in any Communication Services, and Microsoft specifically disclaims any liability with regard to the Communication Services. Managers and hosts are not authorized Microsoft spokespersons, and their views do not necessarily reflect those of Microsoft.
          - paragraph [ref=e130]: Materials uploaded to the Communication Services may be subject to posted limitations on usage, reproduction, or dissemination. You are responsible for adhering to such limitations if you download the materials.
          - heading "Communications policy" [level=2] [ref=e131]:
            - generic [ref=e132]: Communications policy
          - paragraph [ref=e133]: You may receive periodic email communications with best practices, training, tips and tricks, and valuable offers related to Azure and other Microsoft academic programs and services. You can stop receiving communications by opting out via the unsubscribe link in the emails. Read the Microsoft privacy statement.
          - heading "Payment options" [level=2] [ref=e134]:
            - generic [ref=e135]: Payment options
          - paragraph [ref=e136]:
            - text: A credit card is not required for the Azure for Students Starter offer. You may upgrade to a
            - link "Pay-As-You-Go subscription" [ref=e137] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0003p/
            - text: online.
          - heading "Cancellation policy" [level=2] [ref=e138]:
            - generic [ref=e139]: Cancellation policy
          - paragraph [ref=e140]: You may cancel at any time. Payment is required for any outstanding fees incurred.
          - heading "Renewal policy" [level=2] [ref=e141]:
            - generic [ref=e142]: Renewal policy
          - paragraph [ref=e143]: As long as you are a validated user of the Microsoft Azure for Students Starter program, you will have access rights to this offering.
          - heading "Use rights" [level=2] [ref=e144]:
            - generic [ref=e145]: Use rights
          - paragraph [ref=e146]: Azure’s Microsoft Imagine benefit is intended for development and test purposes. Production workloads must be run on a different Azure subscription.
          - heading "Offer availability" [level=2] [ref=e147]:
            - generic [ref=e148]: Offer availability
          - paragraph [ref=e149]: "This offer is available to customers located in the following countries/regions and will be billed in the currency noted:"
