          - heading "Limits, quotas, and constraints" [level=2] [ref=e1719]:
            - generic [ref=e1720]: Limits, quotas, and constraints
          - paragraph [ref=e1721]:
            - text: Please refer to the
            - link "service limits, quotas, and constraints document" [ref=e1722] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2244139
            - text: for a list of common Microsoft Azure limits, also called quotas. If you need to exceed these limits, please contact
            - link "customer service support" [ref=e1723] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/support/
              - text: customer service
            - text: at any time so that we can adjust your limits appropriately. You must upgrade your Azure for Students Starter subscription to a
            - link "Pay-As-You-Go subscription" [ref=e1724] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0003p/
            - text: to increase your quotas or limits.
          - heading "Service-level agreements" [level=2] [ref=e1725]:
            - generic [ref=e1726]: Service-level agreements
          - paragraph [ref=e1727]:
            - text: We offer a set of robust service level agreements for each of the Azure platform services. More details on each of our SLAs can be found on our
            - link "SLA page" [ref=e1728] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2241222
            - text: . Service level agreements are not provided for services during preview.
          - heading "Resource commitment" [level=2] [ref=e1729]:
            - generic [ref=e1730]: Resource commitment
          - paragraph [ref=e1731]: All increases in service usage (for example, adding to the number of compute instances running or increasing the amount of storage in use) are subject to the availability of these service resources. Any quota described in the limits, quotas, and constraints section is not a commitment that there will be sufficient resources available for you to reach the quota.
          - paragraph [ref=e1732]: "If any Microsoft Azure for Students Starter subscription is not incurring charges or is inactive for more than 90 days, we reserve the right to remove any compute resources, including hosted services, virtual machines, and websites. We will provide notice before removing any compute resources. You can avoid becoming inactive by doing one of the following at least every 90 days:"
          - list [ref=e1733]:
            - listitem [ref=e1734]:
              - text: Log into the
              - link "Azure portal" [ref=e1735] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2243551
              - text: .
            - listitem [ref=e1736]: Access your resources via our Azure APIs.
          - paragraph [ref=e1737]: Microsoft reserves the right to modify or discontinue this offer or any of the free services at any time with or without notice.
