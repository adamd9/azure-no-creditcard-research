            - text: Before you can order CSP offers on behalf of a customer, the customer must accept the Microsoft Customer Agreement. You can find the applicable agreement for your customer's location at
            - link "Microsoft Customer Agreements by region and language" [ref=e296] [cursor=pointer]:
