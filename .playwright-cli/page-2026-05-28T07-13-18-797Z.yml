            - text: Your market includes the countries/regions where you can sell CSP offers. Your company's location determines your market. For more information, see
            - link "Cloud Solution Provider program regional markets and currencies" [ref=e294] [cursor=pointer]:
              - /url: regional-authorization-overview
            - text: .
