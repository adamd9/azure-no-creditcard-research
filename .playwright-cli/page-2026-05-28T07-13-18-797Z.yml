          - paragraph [ref=e211]:
            - strong [ref=e212]: Appropriate roles
            - text: ": All partners interested in Partner Center"
          - paragraph [ref=e213]: This article provides an overview of the Cloud Solution Provider (CSP) authorization. It explains the different operational models and their requirements, and provides details about going to market through this sales motion.
          - paragraph [ref=e214]: The CSP authorization helps you achieve more growth opportunities, valuable relationships, and customer success by unlocking the industry-leading cloud partner program within the powerful Microsoft ecosystem.
          - list [ref=e215]:
            - listitem [ref=e216]: "Engage deeper with your customers: Gain a better understanding of their business and needs."
            - listitem [ref=e217]: "Increase profits: Offering deployment and support expertise, whether as a direct bill partner or through an indirect provider, opens up new revenue streams."
            - listitem [ref=e218]: "Add value: Offer customers industry-specific solutions bundled with Microsoft products."
            - listitem [ref=e219]: "Own the end-to-end customer lifecycle: You're well positioned to meet customer demand for managed services."
          - generic [ref=e220]:
            - 'link "Section titled: Verification eligibility requirements for CSP partners" [ref=e221] [cursor=pointer]':
              - /url: "#verification-eligibility-requirements-for-csp-partners"
              - text: 
            - heading "Verification eligibility requirements for CSP partners" [level=2] [ref=e222]
          - paragraph [ref=e223]: "The following eligibility criteria apply to all CSP partners, regardless of their authorization type:"
          - list [ref=e224]:
            - listitem [ref=e225]:
              - paragraph [ref=e226]:
                - strong [ref=e227]: Pass the business verification process
                - text: . As part of the CSP authorization process, partners must pass business verification including, without limitation, email ownership, identity verification, employment verification, and other due diligence. For more information on each verification check, see
                - link "Verify your account information" [ref=e228] [cursor=pointer]:
                  - /url: verification-responses
                - text: .
            - listitem [ref=e229]:
              - paragraph [ref=e230]:
                - strong [ref=e231]: Maintain active verification status
                - text: . To remain eligible for CSP transactions, partners must pass business vetting annually. For more information about your verification status, see
                - link "Verify Your Account Information" [ref=e232] [cursor=pointer]:
                  - /url: verification-responses
                - text: .
            - listitem [ref=e233]:
              - paragraph [ref=e234]:
                - strong [ref=e235]: Update partner profile
                - text: . Partners must ensure that their legal business profile, including company name, company address, and primary contact details, is kept up to date in Partner Center. For more information about updating your legal details, see
                - link "Verify your company profile" [ref=e236] [cursor=pointer]:
                  - /url: ../account-settings/update-your-partner-profile#update-your-csp-legal-billing-address
                - text: .
          - generic [ref=e237]:
            - 'link "Section titled: What are the different types of CSP authorization?" [ref=e238] [cursor=pointer]':
              - /url: "#what-are-the-different-types-of-csp-authorization"
