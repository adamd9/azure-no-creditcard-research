            - heading "What are the different types of CSP authorization?" [level=2] [ref=e239]
          - paragraph [ref=e240]:
            - text: "There are two sales models for CSP authorization: the"
            - emphasis [ref=e241]: indirect model
            - text: and the
            - emphasis [ref=e242]: direct-bill model
            - text: .
          - generic [ref=e243]:
            - paragraph [ref=e244]:
              - generic [ref=e246]: ）
              - text: Important
            - paragraph [ref=e247]:
              - text: If you have questions about authorization requirements the
              - link "Technical Presales and Deployment (TPD)" [ref=e248] [cursor=pointer]:
                - /url: /en-us/partner-center/benefits/technical-benefits
              - text: "team can help by:"
            - list [ref=e249]:
              - listitem [ref=e250]: Advising on the most appropriate CSP model and partner tenant architecture
              - listitem [ref=e251]: Answering authorization requirement questions and risk scenarios
              - listitem [ref=e252]: Guiding the design of secure customer tenancies, including best‑practice access and administration models
          - generic [ref=e253]:
            - 'link "Section titled: Indirect model" [ref=e254] [cursor=pointer]':
              - /url: "#indirect-model"
              - text: 
            - heading "Indirect model" [level=3] [ref=e255]
          - paragraph [ref=e256]: Microsoft built a global network of qualified distributors (formerly known as indirect providers) who help CSP indirect resellers grow their cloud businesses successfully. By joining as an indirect reseller, you can accelerate your go-to-market with minimized operational complexity and investment.
          - paragraph [ref=e257]: As an indirect reseller, you can work with distributors who can deliver the tools and resources to help you manage your customer relationships. With the indirect model, you can purchase from a distributor who can collaborate with you for marketing, customer support, and billing. Eligibility for direct bill status requires that you transacted as an indirect reseller for the previous 12 months.
          - generic [ref=e258]:
            - 'link "Section titled: Indirect model requirements" [ref=e259] [cursor=pointer]':
              - /url: "#indirect-model-requirements"
              - text: 
            - heading "Indirect model requirements" [level=4] [ref=e260]
          - list [ref=e261]:
            - listitem [ref=e262]: An active membership in the Microsoft AI Cloud Partner Program (MAICPP) and Partner Location Account (PLA) ID for the location you want to sell in
            - listitem [ref=e263]: The ability to accept/sign legal agreements on behalf of your organization
            - listitem [ref=e264]:
              - text: A partnership with an
              - link "authorized distributor" [ref=e265] [cursor=pointer]:
                - /url: https://partner.microsoft.com/membership/cloud-solution-provider/find-a-provider
          - generic [ref=e266]:
            - 'link "Section titled: Direct-bill model" [ref=e267] [cursor=pointer]':
              - /url: "#direct-bill-model"
              - text: 
            - heading "Direct-bill model" [level=3] [ref=e268]
          - paragraph [ref=e269]: In the direct-bill model, partners purchase Microsoft products and subscriptions directly from Microsoft and sell them directly to their customers through their in-house sales staff. The direct bill model requires partners to sell to, bill, manage, and support their customers autonomously. Partners who already operate with, or are willing to develop, the appropriate sales, billing, and support infrastructure can choose the direct model.
          - generic [ref=e270]:
            - paragraph [ref=e271]:
              - generic [ref=e273]: ７
              - text: Note
            - paragraph [ref=e274]: Direct-bill status doesn't guarantee that the partner has an assigned Microsoft account manager.
          - generic [ref=e275]:
            - 'link "Section titled: Direct-bill model requirements" [ref=e276] [cursor=pointer]':
              - /url: "#direct-bill-model-requirements"
              - text: 
            - heading "Direct-bill model requirements" [level=4] [ref=e277]
          - list [ref=e278]:
            - listitem [ref=e279]: An active membership in the Microsoft AI Cloud Partner Program (MAICPP) and a Partner Location Account (PLA) ID for your business address.
            - listitem [ref=e280]: At least the prior 12 months as an authorized indirect reseller.
            - listitem [ref=e281]:
              - text: Have at least USD one million in CSP trailing 12 months (TTM) transactional revenue at the Partner Global Account (PGA) level. (Partners can review their TTM revenue in the
              - link "Partner Global - CSP Transactional TTM revenue card" [ref=e282] [cursor=pointer]:
                - /url: https://partner.microsoft.com/dashboard/insights/partnerinsights/subscriptions
              - text: in Partner Center Insights workspace.) The sales that make up your USD one million TTM revenue are subject to review and verification by Microsoft, and you might be asked to provide additional information. The revenue requirement is calculated based on cloud revenue and includes perpetual software in CSP. Eligibility is evaluated independently per PGA; Indirect Reseller revenue is excluded.
            - listitem [ref=e283]:
              - text: A passing score on a capabilities assessment covering areas of CSP such as billing, provisioning, customer support, compliance, and security. Each applicant that meets the basic eligibility requirements is contacted by Microsoft’s partner assessments consultant for next steps. For details on the capabilities covered in the assessment, see
              - link "Requirements for CSP Direct-Bill Partners" [ref=e284] [cursor=pointer]:
                - /url: direct-partner-new-requirements#verify-minimum-requirements-and-capabilities
              - text: .
            - listitem [ref=e285]:
              - text: Demonstrate that you provide at least one managed service, IP service, or customer solution application. For more information, see
              - link "adding managed services" [ref=e286] [cursor=pointer]:
                - /url: https://partner.microsoft.com/solutions/managed-services
              - text: .
            - listitem [ref=e287]: At least one MAICPP Solution Partner designation.
            - listitem [ref=e288]: Complete all mandatory requirements of the Partner Center security score.
            - listitem [ref=e289]: Purchase of a Microsoft Advanced Support for Partners plan or a Microsoft Premier Support for Partners plan.
          - generic [ref=e290]:
            - 'link "Section titled: Where can I sell through the CSP program?" [ref=e291] [cursor=pointer]':
              - /url: "#where-can-i-sell-through-the-csp-program"
