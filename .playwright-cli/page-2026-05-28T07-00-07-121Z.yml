          - generic [ref=e228]:
            - 'link "Section titled: Services can be created in any region" [ref=e229] [cursor=pointer]':
              - /url: "#services-can-be-created-in-any-region"
              - text: 
            - heading "Services can be created in any region" [level=2] [ref=e230]
          - paragraph [ref=e231]: As long as you are within the limits, you can create services for free in any region where services are available. For example, you get 750 hours of a B1S Windows virtual machine free each month with the Azure free account. You can create the virtual machine in any region where B-series virtual machines are available. Azure doesn't charge you unless you exceed 750 hours. For example, a customer in the U.S. can provision a B1S Windows virtual machine in West Europe and use it for 750 hours for free.
          - paragraph [ref=e232]:
            - text: To learn about Azure service availability by region, see
            - link "Products available by region" [ref=e233] [cursor=pointer]:
