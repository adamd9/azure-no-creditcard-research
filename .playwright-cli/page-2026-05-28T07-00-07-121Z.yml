          - paragraph [ref=e237]: You can create multiple instances of services for free if your total usage is within the usage limit. For example, you get 750 hours of a B1S Windows virtual machine free each month with your Azure free account. Use 750 hours in any combination you want. You can create 5 B1S Windows virtual machines and use them for 150 hours each.
