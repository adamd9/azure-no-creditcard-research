        - generic [ref=e210]:
          - paragraph [ref=e211]: During the first 30 days after you've created an Azure free account, you have $200 credit in your billing currency to use on any service, except for third-party Marketplace purchases. You can experiment with different tiers and types of Azure services using the free credit to try out Azure. If you use services or Azure resources that aren’t free during that time, charges are deducted against your credit.
          - paragraph [ref=e212]:
            - text: If you don’t use all of your credit by the end of the first 30 days, it's lost. After the first 30 days and up to 12 months after sign-up, you can only use a limited quantity of
            - emphasis [ref=e213]: some services
            - text: —not all Azure services are free. If you upgrade before 30 days and have remaining credit, you can use the rest of your credit with a pay-as-you-go subscription for the remaining days. For example, if you sign up for the free account on November 1 and upgrade on November 5, you have until November 30 to use your credit in the new pay-as-you-go subscription.
          - paragraph [ref=e214]:
            - text: Your Azure free account includes a
            - emphasis [ref=e215]: specified quantity
            - text: of free services for 12 months and a set of services that are always free. Only some tiers of services are available for free within certain quantities. For example, Azure has many virtual machines intended for different needs. The free account includes access to three types of VMs for free—the B1S, B2pts v2 (ARM-based), and B2ats v2 (AMD-based) burstable VMs that are usable for up to 750 hours per month. By staying in the free account limits, you can use the free services in various configurations. For more information about the Azure free account and the products that are available for free, see
            - link "Azure free account FAQ" [ref=e216] [cursor=pointer]:
              - /url: https://azure.microsoft.com/pricing/purchase-options/azure-account?cid=msft_learn_0f0e4e11-2d6d-3684-ca8d-f7dbdd04d4bd
            - text: .
          - generic [ref=e217]:
            - 'link "Section titled: Create free services in the Azure portal" [ref=e218] [cursor=pointer]':
              - /url: "#create-free-services-in-the-azure-portal"
              - text: 
            - heading "Create free services in the Azure portal" [level=2] [ref=e219]
          - paragraph [ref=e220]:
            - text: We recommend that use the
            - link "Free service page" [ref=e221] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=859151
            - text: in the Azure portal to create free services. Or you can sign in to the
            - link "Azure portal" [ref=e222] [cursor=pointer]:
              - /url: https://portal.azure.com
            - text: ", and search for"
            - strong [ref=e223]: free services
            - text: . If you create resources outside of the Free services pages, free tiers or free resource configuration options aren’t always selected by default. To avoid charges, ensure that you create resources from the Free services page. And then when you create a resource, be sure to the select the tier that's free.
          - paragraph [ref=e224]:
            - link "Screenshot that shows free services page. " [ref=e226] [cursor=pointer]:
              - /url: media/create-free-services/billing-freeservices-grid.png#lightbox
              - img "Screenshot that shows free services page." [ref=e227]
