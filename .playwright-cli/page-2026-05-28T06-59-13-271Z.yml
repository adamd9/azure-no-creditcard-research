          - heading "Azure for Students" [level=1] [ref=e56]
          - link "Apply now for Students verification" [ref=e59] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/?linkid=2244463&clcid=0x409
            - text: Apply now
        - generic [ref=e65]:
          - paragraph [ref=e66]:
            - text: Azure for Students gets you started with $100 in Azure credits to be used within the first 12 months, plus select free services as described below (services subject to change) without requiring a credit card at sign-up. Apply
            - link "Apply here for Students verification" [ref=e67] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2244463
              - text: here
            - text: .
          - paragraph [ref=e68]: Azure for Students is available only to students who meet the following requirements. You must affirm that you are age 18 or older and attend an accredited, degree-granting two-year or four-year educational institution where you’re a full-time student. You must verify your academic status through your organization’s email address. This offer is not available for use in a massive open online course (MOOC) or in other professional trainings from for-profit organizations.
          - paragraph [ref=e69]: This offer is limited to one Azure for Students subscription per eligible customer, is non-transferable, and cannot be combined with any other offer unless otherwise permitted by Microsoft. Azure for Students has a limited supply of activations and the offer is available only while supplies last. Microsoft may terminate this offer at our sole discretion. Other restrictions may apply.
          - heading "Upgrades and spending limits" [level=2] [ref=e70]:
            - generic [ref=e71]: Upgrades and spending limits
          - paragraph [ref=e72]: With Azure for Students, eligible customers receive $100 in credits, which can be used within 12 months on most Azure products. Any unused credits cannot be carried over to subsequent months and cannot be transferred to other Azure subscriptions.
          - paragraph [ref=e73]:
            - text: If you exhaust your available credits, your Azure subscription will be disabled. You may then upgrade to a
            - link "Pay-As-You-Go subscription" [ref=e74] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0003p/
            - text: by contacting Azure Support. This allows continued use of Azure.
          - heading "Software Download Benefits" [level=2] [ref=e75]:
            - generic [ref=e76]: Software Download Benefits
          - paragraph [ref=e77]: Your Subscription will provide you with access to certain Software Download Benefits expressly intended to support your education, non-commercial research, or efforts to design, develop, test, and demonstrate software applications for the above purposes. Software Download Benefits are personal to you and you may not transfer, sell, share, sublicense, assign, or lend them. Your access to and use of the Software Download Benefits are subject to the terms of this Agreement and any separate terms that are specific to the particular benefit. You must have an, active Azure for Students subscription in order to access the Software Download Benefits.
          - heading "Software" [level=2] [ref=e78]:
            - generic [ref=e79]: Software
          - paragraph [ref=e80]: Your installation and use of any software; cloud services or developer tools provided as Software Download Benefits is subject to separate license terms provided with the software, services or tools, such as click-through license terms, except for any changes to those terms that are provided in this Agreement. You may only use these Software Download Benefits in a virtual environment if allowed by the specific product end user license. Of course, you may not use the software, cloud services of developer tools to develop any form of malicious software or spamware.
          - paragraph [ref=e81]: Certain software may require activation. If so, you must activate the software within the geographic region associated with your Azure for Students subscription.
          - paragraph [ref=e82]: Certain software may require a key to install or access it. You are responsible for the use of any keys assigned to you. You may not transfer, sell, share, sublicense, assign, or lend keys. Key activity is monitored. Microsoft reserves the right to suspend or terminate your Azure for Students subscription or access to the software, without any notice or obligation to you, if we detect suspicious activity related to keys or activations. Microsoft reserves the right to determine in its sole discretion whether an activity constitutes suspicious activity. Microsoft may deactivate or otherwise limit your keys when your Azure for Students subscription ends. Deactivated keys will not be able to activate software. You will not engage in or facilitate the unauthorized manufacture, duplication, delivery, sale, transfer or use of counterfeit, pirated, unlicensed or illegal Microsoft products or services, or otherwise infringe any of Microsoft’s intellectual property rights. You will timely report to Microsoft any suspected counterfeiting, piracy or other intellectual property infringement, and will reasonably cooperate with Microsoft and its affiliates in the investigation of any such activities. You may not use Software Download Benefits to provide any services to others (such as hosting, web agency, integration or outsourced development, etc.).
          - paragraph [ref=e83]: The software may include third party code. Any third party scripts or code, linked to or referenced from the software, are licensed to you by the third parties that own such code, not by Microsoft. Notices, if any, for the third party code are included for your information only. The software made available to you in the Azure for Students subscription is licensed, not sold, and Microsoft reserves all rights to the software not expressly granted by Microsoft, whether by implication, estoppel, or otherwise.
          - heading "Exclusions" [level=2] [ref=e84]:
            - generic [ref=e85]: Exclusions
          - paragraph [ref=e86]: Azure credits may not be used to purchase Azure support plans, Azure DevOps, Visual Studio subscriptions, Visual Studio App Center services, Express Route, third-party branded products, products sold through the Azure Marketplace, or products otherwise licensed separately from Azure (for example, Microsoft Entra ID Premium).
          - heading "Prohibited Use of Azure for Students" [level=2] [ref=e87]:
            - generic [ref=e88]: Prohibited Use of Azure for Students
          - paragraph [ref=e89]: As a condition of your use of Azure for Students, you will not use them for any purpose that is unlawful or prohibited by these terms, conditions, and notices. You may not use Azure for Students in any manner that could damage, disable, overburden, or impair any Microsoft server, or the network(s) connected to any Microsoft server, or interfere with any other party's use and enjoyment of Azure for Students. You may not attempt to gain unauthorized access to any Azure for Students, other accounts, computer systems, or networks connected to any Microsoft server through hacking, password mining, or any other means. You may not obtain or attempt to obtain any materials or information through any means not intentionally made available through the Azure for Students.
          - paragraph [ref=e90]: You will not facilitate, engage in, or participate in any use of Microsoft software, services or offerings that may be provided in connection with the Program Benefits, including but not limited to Microsoft Azure, for cryptocurrency mining, denial of service attacks, spamming, or illegal activity, and/or any use that could cause harm to Microsoft or others, and will enforce strong internal controls to prevent the same. Microsoft may from time to time contact you regarding your use of the Program Benefits and you will upon such request provide reasonable documentation regarding your use. If Microsoft believes for any reason that such the Program Benefits are being used for any prohibited purpose, Microsoft may, in its sole discretion, suspend or terminate your access the Program Benefits.
          - heading "Communication Services – prohibited uses" [level=2] [ref=e91]:
            - generic [ref=e92]: Communication Services – prohibited uses
          - paragraph [ref=e93]: "Azure for Students and associated website(s) may contain e-mail services, bulletin board services, chat areas, forums, communities, personal web pages, calendars, photo albums, file cabinets, and/or other message or communication facilities designed to enable you to communicate with others (\"Communication Services\"). You agree to use the Communication Services only to post, send, and receive messages and material that are proper and, when applicable, related to the particular Communication Service. By way of example, and not as a limitation, you agree that when using the Communication Services, you will not:"
          - paragraph [ref=e94]: Use the Communication Services in connection with surveys, contests, pyramid schemes, chain letters, junk email, spamming, or any duplicative or unsolicited messages (commercial or otherwise).
          - paragraph [ref=e95]: Defame, abuse, harass, stalk, threaten, or otherwise violate the legal rights (such as rights of privacy and publicity) of others.
          - paragraph [ref=e96]: Publish, post, upload, distribute, or disseminate any inappropriate, profane, defamatory, obscene, indecent, or unlawful topic, name, material, or information.
          - paragraph [ref=e97]: Upload, or otherwise make available, files that contain images, photographs, software, or other material protected by intellectual property laws, including, by way of example, and not as limitation, copyright or trademark laws (or by rights of privacy or publicity) unless you own or control the rights thereto or have received all necessary consent to do the same.
          - paragraph [ref=e98]: Use any material or information, including images or photographs, which are made available through the Communication Services in any manner that infringes any copyright, trademark, patent, trade secret, or other proprietary right of any party.
          - paragraph [ref=e99]: Upload files that contain viruses, Trojan horses, worms, time bombs, ransomware, cancelbots, corrupted files, malware in general, or any other similar software or programs that may damage the operation of another's computer or property of another.
          - paragraph [ref=e100]: Advertise or offer to sell or buy any goods or services for any business purpose, unless such Communication Services specifically allows such messages.
          - paragraph [ref=e101]: Download any file posted by another user of a Communication Service that you know, or reasonably should know, cannot be legally reproduced, displayed, performed, and/or distributed in such manner.
          - paragraph [ref=e102]: Falsify or delete any copyright management information, such as author attributions, legal or other proper notices, or proprietary designations or labels of the origin or source of software or other material contained in a file that is uploaded.
          - paragraph [ref=e103]: Restrict or inhibit any other user from using and enjoying the Communication Services.
          - paragraph [ref=e104]: Violate any code of conduct or other guidelines which may be applicable for any particular Communication Service.
          - paragraph [ref=e105]: Harvest or otherwise collect information about others, including e-mail addresses.
          - paragraph [ref=e106]: Violate any applicable laws or regulations.
          - paragraph [ref=e107]: Create a false identity for the purpose of misleading others.
          - paragraph [ref=e108]: Use, download, or otherwise copy, or provide (whether or not for a fee) to a person or entity any directory of users of Azure for Students or other user or usage information or any portion thereof.
          - paragraph [ref=e109]: Microsoft has no obligation to monitor the Communication Services. However, Microsoft reserves the right to review materials posted to the Communication Services and to remove any materials in its sole discretion.
          - paragraph [ref=e110]: Microsoft reserves the right at all times to disclose any information as Microsoft deems necessary to satisfy any applicable law, regulation, legal process, or governmental request, or to edit, refuse to post, or to remove any information or materials, in whole or in part, in Microsoft's sole discretion.
          - paragraph [ref=e111]: Always use caution when giving out any personally identifiable information about yourself and sensitive information in any Communication Services.
          - paragraph [ref=e112]: Microsoft does not control or endorse the content, messages or information found in any Communication Services, and Microsoft specifically disclaims any liability with regard to the Communication Services. Managers and hosts are not authorized Microsoft spokespersons, and their views do not necessarily reflect those of Microsoft.
          - paragraph [ref=e113]: Materials uploaded to the Communication Services may be subject to posted limitations on usage, reproduction, or dissemination. You are responsible for adhering to such limitations if you download the materials.
        - generic [ref=e119]:
          - heading "Communications policy" [level=2] [ref=e120]:
            - generic [ref=e121]: Communications policy
          - paragraph [ref=e122]:
            - text: You may receive periodic email communications with best practices, training, tips and tricks, and valuable offers related to Azure and other Microsoft academic programs and services. You can stop receiving communications by opting out via the unsubscribe link in the emails.
            - link "Read the Microsoft privacy statement" [ref=e123] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2240462
            - text: .
          - heading "Payment Options" [level=2] [ref=e124]:
            - generic [ref=e125]: Payment Options
          - paragraph [ref=e126]:
            - text: A credit card is not required for the Azure for Students offer. You may upgrade to a
            - link "Pay-As-You-Go subscription" [ref=e127] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0003p/
            - text: by contacting Azure Support.
          - heading "Cancellation Policy" [level=2] [ref=e128]:
            - generic [ref=e129]: Cancellation Policy
          - paragraph [ref=e130]: You may cancel at any time.
          - heading "Offer availability" [level=2] [ref=e131]:
            - generic [ref=e132]: Offer availability
          - paragraph [ref=e133]:
            - text: This offer is available in the more than
            - link "140 countries where azure services are available" [ref=e134] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/explore/global-infrastructure/geographies/#geographies
              - text: 140 countries
            - text: where Azure is commercially available. This does not include sovereign cloud products in US Government, or Azure Germany regions.
          - heading "Limits, quotas, and constraints" [level=2] [ref=e135]:
            - generic [ref=e136]: Limits, quotas, and constraints
          - paragraph [ref=e137]:
            - text: Please refer to the
            - link "limits, quotas, and constraints document" [ref=e138] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2240196
            - text: for a list of common Microsoft Azure limits, quotas, and constraints. If you need to exceed these limits, contact
            - link "customer service support" [ref=e139] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/support/
              - text: customer service
            - text: at any time so that we can adjust your limits appropriately. You must upgrade your Azure free account to a
            - link "pay-as-you-go" [ref=e140] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/offers/ms-azr-0003p/
            - text: subscription in order to increase quotas or limits.
          - heading "Service-level agreements" [level=2] [ref=e141]:
            - generic [ref=e142]: Service-level agreements
          - paragraph [ref=e143]:
            - text: Each Azure service has a set of robust service-level agreements (SLAs). See the
            - link "SLAs for individual Azure services" [ref=e144] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2241222
            - text: . SLAs are not provided for services during preview or for services that are offered free of charge.
          - heading "Resource commitment" [level=2] [ref=e145]:
            - generic [ref=e146]: Resource commitment
          - paragraph [ref=e147]: All increases in service usage (for example, adding to the number of compute instances running or increasing the amount of storage in use) are subject to the availability of these service resources. Any quota described in the limits, quotas, and constraints section is not a commitment that there will be sufficient resources available for you to reach the quota.
          - paragraph [ref=e148]: "If any Azure for Students subscription is not incurring charges or is inactive for more than 90 days, we reserve the right to remove any compute resources, including hosted services, virtual machines, and websites. We will provide notice before removing any compute resources. You can avoid becoming inactive by doing one of the following at least every 90 days:"
          - list [ref=e149]:
            - listitem [ref=e150]:
              - text: Log into the
              - link "Azure portal" [ref=e151] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/?linkid=2243551
              - text: .
            - listitem [ref=e152]: Access your resources via our Azure APIs.
          - paragraph [ref=e153]: Microsoft reserves the right to modify or discontinue this offer or any of the free services at any time with or without notice.
