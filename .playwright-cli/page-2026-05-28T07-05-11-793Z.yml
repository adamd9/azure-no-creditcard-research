  - main [ref=e44]:
    - generic [ref=e47]:
      - generic [ref=e54]:
        - heading "Pay-As-You-Go Dev/Test" [level=1] [ref=e56]
        - link "Activate" [ref=e59] [cursor=pointer]:
          - /url: https://go.microsoft.com/fwlink/?linkid=2240484&clcid=0x409
      - generic [ref=e65]:
        - paragraph [ref=e66]: Designed for the needs of teams of Visual Studio subscribers, the Pay-As-You-Go Dev/Test offer allows you to quickly get your team up and running with dev/test environments in the cloud using pre-configured virtual machines, including Windows 10, and low rates on virtual machines, Cloud Services, SQL Database, SQL Managed Instance, HDInsight, App Service (Basic, Standard, Premium v2, Premium v3) and Logic Apps. You have the flexibility to create multiple Azure subscriptions based on this offer, enabling you to maintain isolated environments and a separate bill for different projects or teams.
        - paragraph [ref=e67]:
          - text: This offer is exclusively for active Visual Studio subscribers (excluding VS monthly) and is limited to development and testing only. Visual Studio subscribers can also sign up for an individual
          - link "monthly Azure credit" [ref=e68] [cursor=pointer]:
            - /url: https://azure.microsoft.com/en-us/pricing/member-offers/msdn-benefits-details/
          - text: (one per subscriber). More about
          - link "Visual Studio Subscriptions - Visual Studio" [ref=e69] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/?linkid=2251045
            - text: Visual Studio Subscriptions - Visual Studio (microsoft.com)
          - text: and check out benefits for Azure.
        - heading "Low dev/test rates help you stretch your budget farther" [level=2] [ref=e70]:
          - generic [ref=e71]: Low dev/test rates help you stretch your budget farther
        - paragraph [ref=e72]: Each active Visual Studio subscriber on your team can use the Microsoft software included with their subscription on Azure Virtual Machines for dev/test at no extra charge—you’ll just pay the Linux rate for VMs you run, even VMs with SQL Server, SharePoint Server, or other software that is normally billed at a higher rate. Upload custom virtual machine images yourself or use one of our pre-configured images from the Azure Gallery.
        - paragraph [ref=e73]: In addition to the low dev/test rates on VMs, you also get low rates on Cloud Services, SQL Database, SQL Managed Instance, HDInsight, App Service (Basic, Standard, Premium v2, Premium v3) and Logic Apps.
        - paragraph [ref=e74]:
          - text: You can also enjoy additional savings with
          - link "Reservations for Reserved instances now applicable" [ref=e75] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/?linkid=2240558
            - text: Reservations
          - text: for one-year or three-year commitment on VMs, Azure SQL Database and Azure SQL Managed Instance.
        - heading "Access to Windows 10 and Windows Virtual Desktop service" [level=2] [ref=e76]:
          - generic [ref=e77]: Access to Windows 10 and Windows Virtual Desktop service
        - paragraph [ref=e78]:
          - text: This offer allows you to run Windows 10 images on Azure for dev/test. You can also access the
          - link "Windows Virtual Desktop" [ref=e79] [cursor=pointer]:
            - /url: https://azure.microsoft.com/en-us/products/virtual-desktop/
          - text: service within your DevTest subscription to simplify the management experience of your Windows VMs and easily deploy and scale your development and test environments all while enjoying special discounts.
        - heading "Additional Terms" [level=2] [ref=e80]:
          - generic [ref=e81]: Additional Terms
        - paragraph [ref=e82]: You will be notified at least 30 days in advance of any increases to the rates.
        - paragraph [ref=e83]: As the account owner, you must maintain an active Visual Studio subscription to use this offer. Additionally, all others interacting with resources within the Azure subscription you create based on this offer must be active Visual Studio subscribers.
        - paragraph [ref=e84]: You will not facilitate, engage in, or participate in any use of Azure services, for crypto currency mining, denial of service attacks, spamming, or illegal activity, and/or any use that could cause harm to Microsoft or others, and will enforce strong internal controls to prevent the same. Microsoft may from time to time contact you regarding your use of your Azure services and you will upon such request provide reasonable documentation regarding your use. If Microsoft believes for any reason that such Azure services are being used for any prohibited purpose, Microsoft may, in its sole discretion, suspend or terminate your access to the Azure services.
        - heading "Payment options" [level=2] [ref=e85]:
          - generic [ref=e86]: Payment options
        - paragraph [ref=e87]: All you need is a phone number, a credit card or a debit card (non-prepaid), and a Microsoft account or a GitHub account. Only credit cards are accepted in Hong Kong and Brazil.
        - paragraph [ref=e88]:
          - text: More details on pricing and billing can be found on the Azure
          - link "pricing page of azure" [ref=e89] [cursor=pointer]:
            - /url: https://azure.microsoft.com/en-us/pricing/
            - text: pricing page
          - text: .
        - heading "Cancellation policy" [level=2] [ref=e90]:
          - generic [ref=e91]: Cancellation policy
        - paragraph [ref=e92]: You may cancel at any time. Payment is required for any outstanding fees incurred.
        - heading "Offer availability" [level=2] [ref=e93]:
          - generic [ref=e94]: Offer availability
        - paragraph [ref=e95]: "This offer is available to customers located in the following countries/regions and will be billed in the currency noted:"
