      - generic [ref=e1664]:
        - heading "Limits, Quotas and Constraints" [level=2] [ref=e1665]:
          - generic [ref=e1666]: Limits, Quotas and Constraints
        - paragraph [ref=e1667]:
          - text: Please refer to this
          - link "document for limits, quotas, and constraints" [ref=e1668] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/?linkid=2240812
            - text: document
          - text: for a list of common Microsoft Azure limits, quotas and constraints.
        - paragraph [ref=e1669]:
          - text: The following monthly usage quotas are applied. If you need more than these limits, please contact
          - link "customer service for Azure support" [ref=e1670] [cursor=pointer]:
            - /url: https://azure.microsoft.com/en-us/support/
            - text: customer service
          - text: at any time so that we can understand your needs and adjust these limits appropriately.
        - heading "Service-level agreements" [level=2] [ref=e1671]:
          - generic [ref=e1672]: Service-level agreements
        - paragraph [ref=e1673]:
          - text: This benefit is exclusively for development and testing your applications. Usage within the subscription does not carry a financially-backed
          - link "SLA for Online Services" [ref=e1674] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/?linkid=2241222
            - text: SLA
          - text: ", except for use of Azure DevOps and Visual Studio App Center."
        - heading "Resource Commitment" [level=2] [ref=e1675]:
          - generic [ref=e1676]: Resource Commitment
        - paragraph [ref=e1677]: All increases in usage levels of service resources (e.g. adding to the number of compute instances running, or increasing the amount of storage in use) are subject to the availability of these service resources. Any quota described in the Limits, Quotas and Constraints section is not a commitment that there will be sufficient resources available for you to reach the quota.
        - paragraph [ref=e1678]: For any subscriptions of this offer that are not incurring charges and are inactive for more than 90 days, we reserve the right to remove any compute resources including hosted service(s), virtual machines and websites. Please note that no data would be deleted and customers can redeploy at any time. We will also provide advance notice prior to removing any compute resources.
        - paragraph [ref=e1679]: "You can also avoid having your compute resources removed by doing either of the following every 90 days:"
        - list [ref=e1680]:
          - listitem [ref=e1681]:
            - text: Log into either the
            - link "Azure portal" [ref=e1682] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2240637
            - text: or the new
            - link "Microsoft Azure portal" [ref=e1683] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/?linkid=2240637
          - listitem [ref=e1684]: Access your resources via our Azure APIs
