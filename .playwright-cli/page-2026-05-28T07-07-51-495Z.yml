        - generic [ref=e1690]:
          - paragraph [ref=e1691]: "*Azure credit value excludes any taxes paid on purchase"
          - heading "Adding credits to your subscription" [level=2] [ref=e1692]:
            - generic [ref=e1693]: Adding credits to your subscription
          - paragraph [ref=e1694]: You can add credits to your Azure in Open subscription(s) at any time by purchasing through your partner using the same process you followed originally. Credits are used on a ‘first in first out’ basis and each purchase must be used within 12 months of activation.
          - paragraph [ref=e1695]:
            - text: In the event you are at risk of exhausting your credits prior to reordering additional credits through your partner, there is an option to add credits to your subscription(s) through the use of a credit card. This is done by selecting the subscription to which you would like add credits in the
            - link "usage and billing portal" [ref=e1696] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2244512
            - text: . From this page, select the ‘Add Credits’ option and then select the credit card option under ‘Method.’
          - paragraph [ref=e1697]: "Please note, this feature is not available in the following countries:"
