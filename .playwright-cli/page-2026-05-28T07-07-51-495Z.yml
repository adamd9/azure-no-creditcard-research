          - generic [ref=e100]:
            - heading "Purchase Azure through your reseller" [level=2] [ref=e101]:
              - generic [ref=e102]: Purchase Azure through your reseller
            - paragraph [ref=e103]: Microsoft Azure offers a fast, easy way to start getting the benefits of the cloud for your business, like saving money on IT and scaling up or down as needed. Now you can buy Azure through the Open Licensing program, which provides a simple, flexible way to purchase cloud services from your Microsoft reseller.
            - heading "A familiar, convenient purchasing option" [level=2] [ref=e104]:
              - generic [ref=e105]: A familiar, convenient purchasing option
            - paragraph [ref=e106]: Many small and midsize businesses purchase through Microsoft Open Licensing, and now Azure is available through the same convenient programs as other Microsoft software.
            - heading "Get started" [level=2] [ref=e107]:
              - generic [ref=e108]: Get started
            - paragraph [ref=e109]:
              - text: It’s easy to get started on Azure. Contact your Microsoft partner and find out how the cloud can benefit your business. Need to find a partner? Visit Microsoft
              - link "Pinpoint" [ref=e110] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2244511
              - text: to start today.
            - heading "Are you a Microsoft partner?" [level=2] [ref=e111]:
              - generic [ref=e112]: Are you a Microsoft partner?
            - paragraph [ref=e113]:
              - text: Azure in Open Licensing provides a great way to grow your cloud business with a familiar licensing option that enables you to easily add cloud services along with your other on-premises solutions. Cloud opportunities are exploding, with 35% of Azure business coming from partners like you. Visit the
              - link "getting started" [ref=e114] [cursor=pointer]:
                - /url: https://azure.microsoft.com/en-us/partners/isv/
              - text: page for more on how your can take part in this opportunity. You can also find more information for partners on the
              - link "Partner Marketing Center" [ref=e115] [cursor=pointer]:
                - /url: https://go.microsoft.com/fwlink/p/?linkid=2244127
              - text: ", including a pricing calculator just for Open Licensing."
            - heading "It’s easy. Here’s how it works" [level=2] [ref=e116]:
              - generic [ref=e117]: It’s easy. Here’s how it works
            - paragraph [ref=e119]:
              - text: You purchase Azure Prepayment credits from your reseller in the form of an Online Service Activation (OSA) Key. You can use your credits against any consumption-based Azure service for 12 months following the activation of your OSA Key. Azure pricing is specific to the services consumed. View complete list of Azure Services available for Azure Prepayments and detailed pricing
              - link "here" [ref=e120] [cursor=pointer]:
                - /url: https://azure.microsoft.com/en-us/pricing/
              - text: .
            - paragraph [ref=e121]: Azure service credits are redeemable in increments of the approximate equivalent of $100 per unit purchased. See the equivalent amount of Azure service credit per unit purchased by currency using the currency selector. The below table is the list of currencies that can be used to purchase Azure.
