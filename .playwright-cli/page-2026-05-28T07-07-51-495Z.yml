          - heading "Getting support" [level=2] [ref=e1709]:
            - generic [ref=e1710]: Getting support
          - paragraph [ref=e1711]: Contact your reseller for support, or submit a support case online through the Microsoft Azure classic portal. Subscription and billing issues do not require a support contract. However, technical/break-fix issues will require an Azure support plan, which is sold separately.
          - paragraph [ref=e1712]:
            - text: For details on available support plans, visit the
            - link "Azure Support Plans" [ref=e1713] [cursor=pointer]:
