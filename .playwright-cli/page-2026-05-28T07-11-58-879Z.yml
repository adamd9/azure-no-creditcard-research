          - heading "Azure Pass Sponsorship" [level=1] [ref=e56]
          - link "Activate Microsoft Azure Pass" [ref=e59] [cursor=pointer]:
            - /url: https://go.microsoft.com/fwlink/p/?linkid=2240521&clcid=0x409
            - text: Activate
        - generic [ref=e65]:
          - paragraph [ref=e66]: This restricted offer provides entitled customers with monetary credits to access Microsoft Azure at no charge.
          - heading "Special Pricing" [level=2] [ref=e67]:
            - generic [ref=e68]: Special Pricing
          - paragraph [ref=e70]: The pricing for your Microsoft Azure usage under this offer will be 100% off standard published Pay-As-You-Go rates for the term specified below.
          - heading "Term & Conversion to Paid Account" [level=2] [ref=e71]:
            - generic [ref=e72]: Term & Conversion to Paid Account
          - paragraph [ref=e73]: Unless prohibited by applicable law or otherwise specified in writing, the special pricing will terminate and your subscription(s) under the Microsoft Azure Pass Sponsorship offer will not be converted automatically to the Pay-As-You-Go offer if you have a payment instrument associated with the subscription and upon the earlier occurrence of (1) when your total cumulative usage reaches your Usage Cap (as specified in your invitation e-mail) at standard Pay-As-You-Go rates prior to application of any discount or (2) when you reach your End Date (as specified in your invitation e-mail). Your special pricing will also terminate if your Account ID (as specified in your invitation e-mail) is associated with an applicable Enterprise Agreement enrollment, in which case you will be subject to the pricing and terms of your Enterprise Agreement. You will be responsible for all usage charges after the special pricing expires.
          - paragraph [ref=e74]:
            - text: To add a payment instrument you can follow the steps
            - link "here to Add, update, or delete a payment method" [ref=e75] [cursor=pointer]:
              - /url: https://go.microsoft.com/fwlink/p/?linkid=2240440
              - text: here
            - text: .
          - heading "Exclusions" [level=2] [ref=e76]:
            - generic [ref=e77]: Exclusions
          - paragraph [ref=e78]: Special pricing does not apply to Microsoft Azure support plans, third-party branded products, products sold through Microsoft Azure Marketplace, or products otherwise sold separately from Microsoft Azure (for example, Active Directory Premium). You will be responsible for all charges incurred for these services and products.
          - paragraph [ref=e79]: The Azure Pass Sponsorship offer can't be combined with other licensing, prepaid, or credit offers (i.e Microsoft Enterprise Agreement, Cloud Solution Partner, Azure in Open, Azure Pass, Action Pack, etc.).
          - heading "Additional Terms" [level=2] [ref=e80]:
            - generic [ref=e81]: Additional Terms
          - paragraph [ref=e83]: You will not facilitate, engage in, or participate in any use of Azure services, for crypto currency mining, denial of service attacks, spamming, or illegal activity, and/or any use that could cause harm to Microsoft or others, and Microsoft will enforce strong internal controls to prevent the same. Microsoft may from time to time contact you regarding your use of your Azure services and you will upon such request provide reasonable documentation regarding your use. If Microsoft believes for any reason that such Azure services are being used for any prohibited purpose, Microsoft may, in its sole discretion, suspend or terminate your access to the Azure services with no notice.
          - heading "Payment Options" [level=2] [ref=e84]:
            - generic [ref=e85]: Payment Options
          - paragraph [ref=e87]: All you need is a phone number, a credit card or a debit card (non-prepaid), and a Microsoft account or a GitHub account. Only credit cards are accepted in Hong Kong and Brazil.
          - paragraph [ref=e88]:
            - text: More details on pricing and billing can be found on the Azure
            - link "pricing page" [ref=e89] [cursor=pointer]:
              - /url: https://azure.microsoft.com/en-us/pricing/
            - text: .
          - heading "Cancellation policy" [level=2] [ref=e90]:
            - generic [ref=e91]: Cancellation policy
          - paragraph [ref=e92]: You may cancel at any time. Payment is required for any outstanding fees incurred.
          - heading "Offer availability" [level=2] [ref=e93]:
            - generic [ref=e94]: Offer availability
          - paragraph [ref=e96]: "This offer is available to customers located in the following countries/regions and will be billed in the currency noted:"
